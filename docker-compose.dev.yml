services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        NODE_VERSION: 20.20.1
    ports:
      - "${DEV_BACKEND_PORT:-3001}:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      APP_URL: http://localhost:${DEV_BACKEND_PORT:-3001}
      FRONTEND_URL: http://localhost:${DEV_FRONTEND_PORT:-5173}
      DATABASE_URL: postgresql://music:music@db:5432/music_app?schema=public
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL}
      SESSION_SECRET: ${SESSION_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    volumes:
      - .:/app
      - server_node_modules:/app/node_modules
      - ./downloads:/app/downloads
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm run db:deploy && npm run dev:server"

  client:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        NODE_VERSION: 20.20.1
    ports:
      - "${DEV_FRONTEND_PORT:-5173}:5173"
    environment:
      NODE_ENV: development
      VITE_API_PROXY_TARGET: http://server:3000
    volumes:
      - .:/app
      - client_node_modules:/app/node_modules
    depends_on:
      - server
    command: npm run dev:client

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: music_app
      POSTGRES_USER: music
      POSTGRES_PASSWORD: music
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U music -d music_app"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  client_node_modules:
  postgres_data:
  server_node_modules:
