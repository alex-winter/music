<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>
  <style>
    :root {
      --bg: #07111f;
      --bg-top: #0b1a2d;
      --panel: rgba(14, 24, 39, 0.94);
      --text: #f3f7fb;
      --muted: #91a3bb;
      --accent: #4db6ff;
      --accent-dark: #2e8fd8;
      --border: rgba(145, 163, 187, 0.22);
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(77, 182, 255, 0.16), transparent 24%),
        radial-gradient(circle at top right, rgba(58, 123, 213, 0.18), transparent 30%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg) 55%, #050b14 100%);
      color: var(--text);
    }

    .panel {
      width: min(100%, 460px);
      padding: 34px;
      border-radius: 28px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(18, 32, 51, 0.92) 0%, rgba(10, 18, 31, 0.96) 100%);
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 2.8rem);
      letter-spacing: -0.03em;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .google-button {
      margin-top: 28px;
      display: inline-flex;
      width: 100%;
      justify-content: center;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      border-radius: 999px;
      border: 1px solid transparent;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dark) 100%);
      color: #04111f;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 12px 28px rgba(31, 112, 173, 0.25);
    }

    .hint {
      margin-top: 18px;
      font-size: 0.92rem;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Sign in to continue</h1>
    <p>Google login is required right now. Once you are signed in, the full app and your library become available.</p>
    <a class="google-button" href="/auth/google">Continue With Google</a>
    <p class="hint" id="hint"></p>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const hint = document.getElementById('hint');
    if (params.get('error') === 'google_auth_failed') {
      hint.textContent = 'Google sign-in failed. Please try again.';
    }
  </script>
</body>
</html>
