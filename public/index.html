<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Album Downloader</title>
  <style>
    :root {
      --bg: #07111f;
      --bg-top: #0b1a2d;
      --panel: rgba(14, 24, 39, 0.86);
      --panel-strong: #122033;
      --panel-soft: #18283e;
      --text: #f3f7fb;
      --muted: #91a3bb;
      --accent: #4db6ff;
      --accent-dark: #2e8fd8;
      --accent-soft: rgba(77, 182, 255, 0.14);
      --border: rgba(145, 163, 187, 0.22);
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(77, 182, 255, 0.16), transparent 24%),
        radial-gradient(circle at top right, rgba(58, 123, 213, 0.18), transparent 30%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg) 55%, #050b14 100%);
      color: var(--text);
      letter-spacing: 0.01em;
    }

    .shell {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    .hero,
    .page {
      background: linear-gradient(180deg, rgba(18, 32, 51, 0.92) 0%, rgba(10, 18, 31, 0.96) 100%);
      backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .hero-head,
    .page-head {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 3vw, 3rem);
      line-height: 1;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .prompt-panel {
      display: grid;
      gap: 18px;
    }

    .prompt-box {
      min-height: 150px;
      width: 100%;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
      font: inherit;
      font-size: 1rem;
      background: rgba(7, 14, 24, 0.82);
      color: var(--text);
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .prompt-box::placeholder {
      color: #6f83a0;
    }

    .prompt-box:focus {
      border-color: rgba(77, 182, 255, 0.65);
      box-shadow: 0 0 0 4px rgba(77, 182, 255, 0.12);
    }

    .prompt-tips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .tip-chip {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(24, 40, 62, 0.82);
      color: var(--muted);
      cursor: pointer;
      font: inherit;
    }

    .playlist-result {
      display: grid;
      gap: 14px;
      margin-top: 22px;
    }

    .playlist-summary {
      padding: 18px;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(24, 40, 62, 0.95) 0%, rgba(15, 27, 43, 0.95) 100%);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
    }

    .playlist-summary h2 {
      margin: 0 0 8px;
      font-size: 1.5rem;
    }

    .playlist-song {
      display: grid;
      gap: 10px;
      padding: 16px;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(20, 34, 53, 0.96) 0%, rgba(12, 22, 35, 0.96) 100%);
    }

    .playlist-song-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      flex-wrap: wrap;
    }

    .playlist-song h3 {
      margin: 0 0 4px;
      font-size: 1.05rem;
    }

    .playlist-reason {
      color: var(--muted);
      line-height: 1.5;
      margin: 0;
    }

    .track-meta {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .session-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .session-user {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
    }

    .session-user img {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      object-fit: cover;
      border: 1px solid var(--border);
    }

    button,
    .back {
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 12px 18px;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dark) 100%);
      color: #04111f;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      transition: transform 140ms ease, background 140ms ease, border-color 140ms ease, opacity 140ms ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 28px rgba(31, 112, 173, 0.25);
    }

    button:hover,
    .back:hover {
      transform: translateY(-1px);
      background: var(--accent-dark);
    }

    button.secondary {
      background: var(--panel-soft);
      color: var(--text);
      border-color: var(--border);
      box-shadow: none;
    }

    button:disabled {
      cursor: default;
      opacity: 0.72;
      transform: none;
    }

    .search-box {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px 18px;
      font: inherit;
      font-size: 1.05rem;
      background: rgba(7, 14, 24, 0.82);
      color: var(--text);
      margin-bottom: 20px;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .search-box::placeholder {
      color: #6f83a0;
    }

    .search-box:focus {
      border-color: rgba(77, 182, 255, 0.65);
      box-shadow: 0 0 0 4px rgba(77, 182, 255, 0.12);
    }

    .results,
    .album-grid,
    .track-list,
    .download-list {
      display: grid;
      gap: 14px;
    }

    .results,
    .album-grid {
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    }

    .artist-card,
    .album,
    .track,
    .download-card {
      background: linear-gradient(180deg, rgba(24, 40, 62, 0.95) 0%, rgba(15, 27, 43, 0.95) 100%);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 14px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
    }

    .artist-card,
    .album {
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease;
    }

    .artist-card:hover,
    .album:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.28);
      border-color: rgba(77, 182, 255, 0.28);
    }

    .artist-card img,
    .album img,
    .cover {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 16px;
      margin-bottom: 10px;
    }

    .hero-head p,
    .page-head p {
      margin-top: 8px;
      max-width: 46ch;
    }

    .track {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      background: linear-gradient(180deg, rgba(20, 34, 53, 0.96) 0%, rgba(12, 22, 35, 0.96) 100%);
    }

    .track button {
      padding: 8px 14px;
      font-size: 0.95rem;
    }

    .track-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .track-status {
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .is-loading {
      gap: 10px;
    }

    .button-loader {
      width: 0.95rem;
      height: 0.95rem;
      border-radius: 999px;
      border: 2px solid rgba(243, 247, 251, 0.22);
      border-top-color: var(--text);
      animation: spin 800ms linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .download-card h3 {
      margin: 0 0 6px;
      font-size: 1.08rem;
    }

    .meta {
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 12px;
    }

    audio {
      width: 100%;
      filter: brightness(0.92) contrast(1.05);
    }

    .empty {
      padding: 18px;
      border: 1px dashed var(--border);
      border-radius: 18px;
      color: var(--muted);
      text-align: center;
      background: rgba(14, 24, 39, 0.7);
    }

    @media (max-width: 640px) {
      .hero,
      .page {
        padding: 20px;
        border-radius: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="shell" id="app"></div>

  <script>
    let currentTracks = [];
    let currentPreviewAudio = null;
    let currentPreviewButton = null;
    let downloadedTrackKeys = new Set();
    let downloadedTracksByKey = new Map();
    let currentUser = null;
    let currentAiPlaylist = null;

    async function loadSession() {
      const response = await fetch('/auth/session', { credentials: 'same-origin' });

      if (response.status === 401) {
        window.location.href = '/login';
        return null;
      }

      const data = await response.json();
      currentUser = data.user;
      return currentUser;
    }

    function renderSessionBar() {
      if (!currentUser) {
        return '';
      }

      const avatar = currentUser.avatarUrl
        ? `<img src="${currentUser.avatarUrl}" alt="${currentUser.displayName || currentUser.email}" />`
        : '';

      return `
        <div class="session-bar">
          <div class="session-user">
            ${avatar}
            <span>${currentUser.displayName || currentUser.email}</span>
          </div>
          <form method="POST" action="/auth/logout">
            <button type="submit" class="secondary">Log Out</button>
          </form>
        </div>
      `;
    }

    function renderTopNav(activeView = '') {
      return `
        <div class="actions">
          <button class="${activeView === 'library' ? '' : 'secondary'}" onclick="showDownloads()">My Downloads</button>
          <button class="${activeView === 'ai' ? '' : 'secondary'}" onclick="showAiPlaylistPage()">AI Playlist</button>
          <button onclick="renderHome()">Home</button>
        </div>
      `;
    }

    function getTrackKey(track) {
      return `${track.artist.name} - ${track.title}`
        .replace(/[^a-z0-9]/gi, '_')
        .toLowerCase();
    }

    async function refreshDownloadedTrackKeys() {
      const res = await fetch('/downloads');
      const downloads = await res.json();
      downloadedTrackKeys = new Set(downloads.map(file => file.trackKey));
      downloadedTracksByKey = new Map(downloads.map(file => [file.trackKey, file]));
      return downloads;
    }

    function resetPreviewButton() {
      if (currentPreviewButton) {
        currentPreviewButton.textContent = currentPreviewButton.dataset.defaultLabel || 'Play';
        currentPreviewButton.classList.remove('is-loading');
      }
    }

    function stopCurrentPreview() {
      if (currentPreviewAudio) {
        currentPreviewAudio.pause();
        currentPreviewAudio.currentTime = 0;
        currentPreviewAudio = null;
      }

      resetPreviewButton();
      currentPreviewButton = null;
    }

    function togglePreview(previewUrl, button) {
      if (!previewUrl) {
        return;
      }

      if (currentPreviewAudio && currentPreviewButton === button) {
        if (currentPreviewAudio.paused) {
          currentPreviewAudio.play();
          button.textContent = 'Pause';
        } else {
          currentPreviewAudio.pause();
          button.textContent = 'Resume';
        }
        return;
      }

      stopCurrentPreview();

      currentPreviewAudio = new Audio(previewUrl);
      currentPreviewButton = button;
      button.classList.remove('is-loading');
      button.textContent = 'Pause';

      currentPreviewAudio.addEventListener('ended', () => {
        stopCurrentPreview();
      });

      currentPreviewAudio.play();
    }

    function isTrackInLibrary(track) {
      return downloadedTrackKeys.has(getTrackKey(track));
    }

    function showButtonLoader(button, label) {
      button.classList.add('is-loading');
      button.innerHTML = `<span class="button-loader" aria-hidden="true"></span><span>${label}</span>`;
    }

    function updateTrackLibraryState(track, trackElement) {
      const status = trackElement.querySelector('.track-status');

      if (isTrackInLibrary(track)) {
        status.textContent = 'In Library';
        status.hidden = false;
      } else {
        status.textContent = '';
        status.hidden = true;
      }
    }

    async function ensureTrackReady(track) {
      const trackKey = getTrackKey(track);

      if (downloadedTracksByKey.has(trackKey)) {
        return downloadedTracksByKey.get(trackKey);
      }

      const response = await fetch('/download-track', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ track })
      });

      if (!response.ok) {
        const payload = await response.json().catch(() => ({}));
        throw new Error(payload.error || 'Track preparation failed');
      }

      await refreshDownloadedTrackKeys();

      if (!downloadedTracksByKey.has(trackKey)) {
        throw new Error('Track is ready, but the file was not found');
      }

      return downloadedTracksByKey.get(trackKey);
    }

    function renderHome() {
      stopCurrentPreview();

      document.getElementById('app').innerHTML = `
        <section class="hero">
          ${renderSessionBar()}
          <div class="hero-head">
            <div>
              <h1>Album Downloader</h1>
              <p>Search artists, preview tracks, and open your downloaded library.</p>
            </div>
            ${renderTopNav('home')}
          </div>
          <input class="search-box" id="search" placeholder="Search for an artist..." autocomplete="off" oninput="liveSearch()" />
          <div class="results" id="results"></div>
        </section>
      `;
    }

    async function liveSearch() {
      const q = document.getElementById('search').value.trim();
      const container = document.getElementById('results');

      if (!q) {
        container.innerHTML = '';
        return;
      }

      const res = await fetch(`/search?q=${encodeURIComponent(q)}`);
      const artists = await res.json();

      container.innerHTML = '';

      artists.slice(0, 10).forEach(a => {
        const div = document.createElement('div');
        div.className = 'artist-card';
        div.innerHTML = `
          <img src="${a.picture_medium}" alt="${a.name}" />
          <div>${a.name}</div>
        `;
        div.onclick = () => showAlbums(a);
        container.appendChild(div);
      });
    }

    async function showAlbums(artist) {
      stopCurrentPreview();

      const res = await fetch(`/artist/${artist.id}/albums`);
      const albums = await res.json();

      document.getElementById('app').innerHTML = `
        <section class="page">
          ${renderSessionBar()}
          <div class="page-head">
            <div>
              <h1>${artist.name}</h1>
              <p>Open an album to sample tracks and add songs to your library.</p>
            </div>
            ${renderTopNav()}
          </div>
          <div class="album-grid" id="albums"></div>
        </section>
      `;

      const container = document.getElementById('albums');

      albums.forEach(a => {
        const div = document.createElement('div');
        div.className = 'album';
        div.innerHTML = `
          <img src="${a.cover_medium}" alt="${a.title}" />
          <div>${a.title}</div>
        `;
        div.onclick = () => showTracks(a.id);
        container.appendChild(div);
      });
    }

    async function showTracks(id) {
      stopCurrentPreview();

      const res = await fetch(`/album/${id}`);
      const album = await res.json();
      await refreshDownloadedTrackKeys();

      currentTracks = album.tracks.data;

      document.getElementById('app').innerHTML = `
        <section class="page">
          ${renderSessionBar()}
          <div class="page-head">
            <div>
              <h1>${album.title}</h1>
              <p>Sample tracks and add the ones you want to your library.</p>
            </div>
            ${renderTopNav()}
          </div>
          <img class="cover" src="${album.cover_medium}" alt="${album.title}" style="max-width: 220px;" />
          <div class="track-list" id="tracks"></div>
          <div class="actions" style="margin-top: 18px;">
            <button onclick="downloadAlbum()">Add Album To Library</button>
          </div>
        </section>
      `;

      const container = document.getElementById('tracks');

      album.tracks.data.forEach((t, i) => {
        const div = document.createElement('div');
        div.className = 'track';
        div.innerHTML = `
          <span>${i + 1}. ${t.title}</span>
          <div class="track-actions">
            <span class="track-status" hidden></span>
            <button type="button" class="preview-button" data-default-label="Sample">Sample</button>
            <button type="button" class="secondary download-track-button" data-default-label="Play">Play</button>
          </div>
        `;
        updateTrackLibraryState(t, div);
        div.querySelector('.preview-button').onclick = event => {
          event.stopPropagation();
          togglePreview(t.preview, event.currentTarget);
        };
        div.querySelector('.download-track-button').onclick = async event => {
          event.stopPropagation();
          const button = event.currentTarget;
          const isCurrentTrack = currentPreviewAudio && currentPreviewButton === button;

          if (isCurrentTrack && !currentPreviewAudio.paused) {
            currentPreviewAudio.pause();
            button.textContent = 'Resume';
            return;
          }

          if (isCurrentTrack && currentPreviewAudio.paused) {
            currentPreviewAudio.play();
            button.textContent = 'Pause';
            return;
          }

          button.disabled = true;
          button.classList.remove('is-loading');
          if (isTrackInLibrary(t)) {
            button.textContent = 'Play';
          } else {
            showButtonLoader(button, 'Preparing');
          }

          try {
            const file = await ensureTrackReady(t);
            updateTrackLibraryState(t, div);
            button.disabled = false;
            togglePreview(file.url, button);
          } catch (err) {
            alert(err.message);
            button.classList.remove('is-loading');
            button.textContent = button.dataset.defaultLabel;
            button.disabled = false;
          }
        };
        container.appendChild(div);
      });
    }

    async function showDownloads() {
      stopCurrentPreview();

      document.getElementById('app').innerHTML = `
        <section class="page">
          ${renderSessionBar()}
          <div class="page-head">
            <div>
              <h1>My Downloads</h1>
              <p>Play anything already saved in your downloads folder.</p>
            </div>
            <div class="actions">
              <button onclick="showDownloads()">Refresh</button>
              <button class="secondary" onclick="showAiPlaylistPage()">AI Playlist</button>
              <button class="secondary" onclick="renderHome()">Home</button>
            </div>
          </div>
          <div class="download-list" id="downloads-list"></div>
        </section>
      `;

      const downloads = await refreshDownloadedTrackKeys();
      const container = document.getElementById('downloads-list');

      if (!downloads.length) {
        container.innerHTML = '<div class="empty">No downloaded audio found yet.</div>';
        return;
      }

      downloads.forEach(file => {
        const div = document.createElement('div');
        div.className = 'download-card';
        const modifiedDate = new Date(file.modifiedAt).toLocaleString();
        const sizeMb = (file.size / (1024 * 1024)).toFixed(2);

        div.innerHTML = `
          <h3>${file.title}</h3>
          <div class="meta">${file.ext.replace('.', '').toUpperCase()} • ${sizeMb} MB • ${modifiedDate}</div>
          <audio controls preload="none" src="${file.url}"></audio>
        `;
        container.appendChild(div);
      });
    }

    async function downloadAlbum() {
      await fetch('/download-album', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tracks: currentTracks })
      });

      alert('Album added to library');
    }

    async function addTrackToLibrary(track, button, trackElement) {
      const originalLabel = button.textContent;
      button.disabled = true;
      showButtonLoader(button, 'Adding');

      try {
        const response = await fetch('/download-track', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ track })
        });

        if (!response.ok) {
          const payload = await response.json().catch(() => ({}));
          throw new Error(payload.error || 'Track add failed');
        }

        await refreshDownloadedTrackKeys();
        updateTrackLibraryState(track, trackElement);
        button.classList.remove('is-loading');
        button.textContent = 'Added';
      } catch (error) {
        alert(error.message);
        button.classList.remove('is-loading');
        button.textContent = originalLabel;
        button.disabled = false;
      }
    }

    function renderAiPlaylistResults() {
      const container = document.getElementById('playlist-result');

      if (!currentAiPlaylist) {
        container.innerHTML = '';
        return;
      }

      container.innerHTML = '';

      const summary = document.createElement('div');
      summary.className = 'playlist-summary';
      summary.innerHTML = `
        <h2>${currentAiPlaylist.title}</h2>
        <p>${currentAiPlaylist.description}</p>
        ${currentAiPlaylist.autoAddedFirstTrack ? '<p class="track-meta">The first song was automatically added to your library.</p>' : ''}
      `;
      container.appendChild(summary);

      currentAiPlaylist.songs.forEach((song, index) => {
        const songCard = document.createElement('div');
        songCard.className = 'playlist-song';
        const matchedTrack = song.matchedTrack;
        const inLibrary = matchedTrack && isTrackInLibrary(matchedTrack);

        songCard.innerHTML = `
          <div class="playlist-song-head">
            <div>
              <h3>${index + 1}. ${song.title}</h3>
              <div class="track-meta">${song.artist}</div>
            </div>
            <div class="track-actions">
              <span class="track-status"${inLibrary ? '' : ' hidden'}>${inLibrary ? 'In Library' : ''}</span>
              <button type="button" class="preview-button" data-default-label="Sample"${matchedTrack?.preview ? '' : ' disabled'}>Sample</button>
              <button type="button" class="secondary library-button" data-default-label="Add"${matchedTrack ? '' : ' disabled'}>${inLibrary ? 'Added' : 'Add'}</button>
            </div>
          </div>
          <p class="playlist-reason">${song.reason || 'Fits the overall prompt and mood.'}</p>
          <div class="track-meta">Matched in Deezer: ${matchedTrack.title} • ${matchedTrack.artist.name}</div>
        `;

        const previewButton = songCard.querySelector('.preview-button');
        previewButton.onclick = event => {
          event.stopPropagation();
          if (matchedTrack?.preview) {
            togglePreview(matchedTrack.preview, event.currentTarget);
          }
        };

        const libraryButton = songCard.querySelector('.library-button');
        if (matchedTrack && !inLibrary) {
          libraryButton.onclick = event => {
            event.stopPropagation();
            addTrackToLibrary(matchedTrack, event.currentTarget, songCard);
          };
        }

        container.appendChild(songCard);
      });
    }

    function showAiPlaylistPage() {
      stopCurrentPreview();
      currentAiPlaylist = null;

      document.getElementById('app').innerHTML = `
        <section class="page">
          ${renderSessionBar()}
          <div class="page-head">
            <div>
              <h1>AI Playlist</h1>
              <p>Describe a mood, scene, memory, activity, or vibe, and the AI will build a playlist concept around it.</p>
            </div>
            ${renderTopNav('ai')}
          </div>
          <div class="prompt-panel">
            <textarea id="playlist-prompt" class="prompt-box" placeholder="Try something like: songs for a rainy midnight train ride through Tokyo, warm synths, dreamy but not sleepy"></textarea>
            <div class="prompt-tips">
              <button class="tip-chip" type="button" onclick="fillPrompt('songs for a rainy midnight train ride through Tokyo, warm synths, dreamy but not sleepy')">Midnight Tokyo</button>
              <button class="tip-chip" type="button" onclick="fillPrompt('an energetic gym playlist with confident women in pop and electronic music')">Gym Energy</button>
              <button class="tip-chip" type="button" onclick="fillPrompt('a golden hour road trip playlist that feels nostalgic, open, and cinematic')">Golden Hour Drive</button>
            </div>
            <div class="actions">
              <button id="generate-playlist-button" onclick="generateAiPlaylist()">Generate Playlist</button>
            </div>
          </div>
          <div class="playlist-result" id="playlist-result"></div>
        </section>
      `;
    }

    function fillPrompt(value) {
      const promptBox = document.getElementById('playlist-prompt');
      promptBox.value = value;
      promptBox.focus();
    }

    async function generateAiPlaylist() {
      const promptBox = document.getElementById('playlist-prompt');
      const prompt = promptBox.value.trim();

      if (!prompt) {
        alert('Please enter a playlist prompt first.');
        return;
      }

      const button = document.getElementById('generate-playlist-button');
      button.disabled = true;
      showButtonLoader(button, 'Generating');

      try {
        await refreshDownloadedTrackKeys();
        const response = await fetch('/ai/playlist', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        });

        if (!response.ok) {
          const payload = await response.json().catch(() => ({}));
          throw new Error(payload.error || 'Playlist generation failed');
        }

        currentAiPlaylist = await response.json();
        await refreshDownloadedTrackKeys();
        renderAiPlaylistResults();
      } catch (error) {
        alert(error.message);
      } finally {
        button.classList.remove('is-loading');
        button.textContent = 'Generate Playlist';
        button.disabled = false;
      }
    }

    loadSession().then(user => {
      if (user) {
        renderHome();
      }
    });
  </script>
</body>
</html>
