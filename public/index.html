<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Album Downloader</title>
  <style>
    :root {
      --bg: #f5efe5;
      --panel: #fffaf2;
      --panel-strong: #fff;
      --text: #1d1b18;
      --muted: #6c655d;
      --accent: #cb5a2c;
      --accent-dark: #903812;
      --border: #e4d8c6;
      --shadow: 0 18px 40px rgba(78, 53, 36, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, rgba(203, 90, 44, 0.16), transparent 28%),
        linear-gradient(180deg, #f8f1e8 0%, #efe4d3 100%);
      color: var(--text);
    }

    .shell {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    .hero,
    .page {
      background: rgba(255, 250, 242, 0.86);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(228, 216, 198, 0.8);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .hero-head,
    .page-head {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 3vw, 3rem);
      line-height: 1;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button,
    .back {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      background: var(--accent);
      color: #fff9f4;
      cursor: pointer;
      font: inherit;
      transition: transform 140ms ease, background 140ms ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    button:hover,
    .back:hover {
      transform: translateY(-1px);
      background: var(--accent-dark);
    }

    button.secondary {
      background: #efe1ce;
      color: var(--text);
    }

    .search-box {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px 18px;
      font: inherit;
      font-size: 1.05rem;
      background: var(--panel-strong);
      color: var(--text);
      margin-bottom: 20px;
    }

    .results,
    .album-grid,
    .track-list,
    .download-list {
      display: grid;
      gap: 14px;
    }

    .results,
    .album-grid {
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    }

    .artist-card,
    .album,
    .track,
    .download-card {
      background: var(--panel-strong);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 14px;
      box-shadow: 0 10px 26px rgba(78, 53, 36, 0.08);
    }

    .artist-card,
    .album {
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease;
    }

    .artist-card:hover,
    .album:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 30px rgba(78, 53, 36, 0.13);
    }

    .artist-card img,
    .album img,
    .cover {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 16px;
      margin-bottom: 10px;
    }

    .track {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .track button {
      padding: 8px 14px;
      font-size: 0.95rem;
    }

    .track-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .download-card h3 {
      margin: 0 0 6px;
      font-size: 1.08rem;
    }

    .meta {
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 12px;
    }

    audio {
      width: 100%;
    }

    .empty {
      padding: 18px;
      border: 1px dashed var(--border);
      border-radius: 18px;
      color: var(--muted);
      text-align: center;
      background: rgba(255, 255, 255, 0.45);
    }

    @media (max-width: 640px) {
      .hero,
      .page {
        padding: 20px;
        border-radius: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="shell" id="app"></div>

  <script>
    let currentTracks = [];
    let currentPreviewAudio = null;
    let currentPreviewButton = null;

    function resetPreviewButton() {
      if (currentPreviewButton) {
        currentPreviewButton.textContent = 'Preview';
      }
    }

    function stopCurrentPreview() {
      if (currentPreviewAudio) {
        currentPreviewAudio.pause();
        currentPreviewAudio.currentTime = 0;
        currentPreviewAudio = null;
      }

      resetPreviewButton();
      currentPreviewButton = null;
    }

    function togglePreview(previewUrl, button) {
      if (!previewUrl) {
        return;
      }

      if (currentPreviewAudio && currentPreviewButton === button) {
        if (currentPreviewAudio.paused) {
          currentPreviewAudio.play();
          button.textContent = 'Pause';
        } else {
          currentPreviewAudio.pause();
          button.textContent = 'Resume';
        }
        return;
      }

      stopCurrentPreview();

      currentPreviewAudio = new Audio(previewUrl);
      currentPreviewButton = button;
      button.textContent = 'Pause';

      currentPreviewAudio.addEventListener('ended', () => {
        stopCurrentPreview();
      });

      currentPreviewAudio.play();
    }

    function renderHome() {
      stopCurrentPreview();

      document.getElementById('app').innerHTML = `
        <section class="hero">
          <div class="hero-head">
            <div>
              <h1>Album Downloader</h1>
              <p>Search artists, preview tracks, and open your downloaded library.</p>
            </div>
            <div class="actions">
              <button class="secondary" onclick="showDownloads()">My Downloads</button>
            </div>
          </div>
          <input class="search-box" id="search" placeholder="Search for an artist..." autocomplete="off" oninput="liveSearch()" />
          <div class="results" id="results"></div>
        </section>
      `;
    }

    async function liveSearch() {
      const q = document.getElementById('search').value.trim();
      const container = document.getElementById('results');

      if (!q) {
        container.innerHTML = '';
        return;
      }

      const res = await fetch(`/search?q=${encodeURIComponent(q)}`);
      const artists = await res.json();

      container.innerHTML = '';

      artists.slice(0, 10).forEach(a => {
        const div = document.createElement('div');
        div.className = 'artist-card';
        div.innerHTML = `
          <img src="${a.picture_medium}" alt="${a.name}" />
          <div>${a.name}</div>
        `;
        div.onclick = () => showAlbums(a);
        container.appendChild(div);
      });
    }

    async function showAlbums(artist) {
      stopCurrentPreview();

      const res = await fetch(`/artist/${artist.id}/albums`);
      const albums = await res.json();

      document.getElementById('app').innerHTML = `
        <section class="page">
          <div class="page-head">
            <div>
              <h1>${artist.name}</h1>
              <p>Select an album to preview tracks or start a download.</p>
            </div>
            <div class="actions">
              <button class="secondary" onclick="showDownloads()">My Downloads</button>
              <button onclick="renderHome()">Back</button>
            </div>
          </div>
          <div class="album-grid" id="albums"></div>
        </section>
      `;

      const container = document.getElementById('albums');

      albums.forEach(a => {
        const div = document.createElement('div');
        div.className = 'album';
        div.innerHTML = `
          <img src="${a.cover_medium}" alt="${a.title}" />
          <div>${a.title}</div>
        `;
        div.onclick = () => showTracks(a.id);
        container.appendChild(div);
      });
    }

    async function showTracks(id) {
      stopCurrentPreview();

      const res = await fetch(`/album/${id}`);
      const album = await res.json();

      currentTracks = album.tracks.data;

      document.getElementById('app').innerHTML = `
        <section class="page">
          <div class="page-head">
            <div>
              <h1>${album.title}</h1>
              <p>Preview tracks, then download the album to your local library.</p>
            </div>
            <div class="actions">
              <button class="secondary" onclick="showDownloads()">My Downloads</button>
              <button onclick="renderHome()">Back</button>
            </div>
          </div>
          <img class="cover" src="${album.cover_medium}" alt="${album.title}" style="max-width: 220px;" />
          <div class="track-list" id="tracks"></div>
          <div class="actions" style="margin-top: 18px;">
            <button onclick="downloadAlbum()">Download Album</button>
          </div>
        </section>
      `;

      const container = document.getElementById('tracks');

      album.tracks.data.forEach((t, i) => {
        const div = document.createElement('div');
        div.className = 'track';
        div.innerHTML = `
          <span>${i + 1}. ${t.title}</span>
          <div class="track-actions">
            <button type="button" class="preview-button">Preview</button>
            <button type="button" class="secondary download-track-button">Download</button>
          </div>
        `;
        div.querySelector('.preview-button').onclick = event => {
          event.stopPropagation();
          togglePreview(t.preview, event.currentTarget);
        };
        div.querySelector('.download-track-button').onclick = async event => {
          event.stopPropagation();
          const button = event.currentTarget;
          const originalLabel = button.textContent;
          button.disabled = true;
          button.textContent = 'Downloading...';

          try {
            const response = await fetch('/download-track', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ track: t })
            });

            if (!response.ok) {
              const payload = await response.json().catch(() => ({}));
              throw new Error(payload.error || 'Track download failed');
            }

            button.textContent = 'Downloaded';
            setTimeout(() => {
              button.textContent = originalLabel;
              button.disabled = false;
            }, 1200);
          } catch (err) {
            alert(err.message);
            button.textContent = originalLabel;
            button.disabled = false;
          }
        };
        container.appendChild(div);
      });
    }

    async function showDownloads() {
      stopCurrentPreview();

      document.getElementById('app').innerHTML = `
        <section class="page">
          <div class="page-head">
            <div>
              <h1>My Downloads</h1>
              <p>Play anything already saved in your downloads folder.</p>
            </div>
            <div class="actions">
              <button class="secondary" onclick="showDownloads()">Refresh</button>
              <button onclick="renderHome()">Back</button>
            </div>
          </div>
          <div class="download-list" id="downloads-list"></div>
        </section>
      `;

      const res = await fetch('/downloads');
      const downloads = await res.json();
      const container = document.getElementById('downloads-list');

      if (!downloads.length) {
        container.innerHTML = '<div class="empty">No downloaded audio found yet.</div>';
        return;
      }

      downloads.forEach(file => {
        const div = document.createElement('div');
        div.className = 'download-card';
        const modifiedDate = new Date(file.modifiedAt).toLocaleString();
        const sizeMb = (file.size / (1024 * 1024)).toFixed(2);

        div.innerHTML = `
          <h3>${file.title}</h3>
          <div class="meta">${file.ext.replace('.', '').toUpperCase()} • ${sizeMb} MB • ${modifiedDate}</div>
          <audio controls preload="none" src="${file.url}"></audio>
        `;
        container.appendChild(div);
      });
    }

    async function downloadAlbum() {
      await fetch('/download-album', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tracks: currentTracks })
      });

      alert('Download started');
    }

    renderHome();
  </script>
</body>
</html>
