<!DOCTYPE html>

<div id="app" class="center-screen">
  <input class="search-box" id="search" placeholder="Search for an artist..." autocomplete="false" oninput="liveSearch()" />
  <div class="results" id="results"></div>
</div>

<script>
let currentTracks = [];

async function liveSearch() {
  const q = document.getElementById('search').value;
  if (!q) return;

  const res = await fetch(`/search?q=${q}`);
  const artists = await res.json();

  const container = document.getElementById('results');
  container.innerHTML = '';

  artists.slice(0, 10).forEach(a => {
    const div = document.createElement('div');
    div.className = 'artist-card';
    div.innerHTML = `
      <img src="${a.picture_medium}" />
      <div>${a.name}</div>
    `;
    div.onclick = () => showAlbums(a);
    container.appendChild(div);
  });
}

async function showAlbums(artist) {
  const res = await fetch(`/artist/${artist.id}/albums`);
  const albums = await res.json();

  document.body.innerHTML = `
    <div class="page">
      <div class="back" onclick="location.reload()">← Back</div>
      <h1>${artist.name}</h1>
      <div class="album-grid" id="albums"></div>
    </div>
  `;

  const container = document.getElementById('albums');

  albums.forEach(a => {
    const div = document.createElement('div');
    div.className = 'album';
    div.innerHTML = `
      <img src="${a.cover_medium}" />
      <div>${a.title}</div>
    `;
    div.onclick = () => showTracks(a.id);
    container.appendChild(div);
  });
}

async function showTracks(id) {
  const res = await fetch(`/album/${id}`);
  const album = await res.json();

  currentTracks = album.tracks.data;

  document.body.innerHTML = `
    <div class="page">
      <div class="back" onclick="location.reload()">← Back</div>
      <h1>${album.title}</h1>
      <img src="${album.cover_medium}" style="width:200px;border-radius:12px;" />
      <div class="track-list" id="tracks"></div>
      <button onclick="downloadAlbum()">Download Album</button>
    </div>
  `;

  const container = document.getElementById('tracks');

  album.tracks.data.forEach((t, i) => {
    const div = document.createElement('div');
    div.className = 'track';
    div.innerHTML = `<span>${i + 1}. ${t.title}</span><span>▶</span>`;
    div.onclick = () => new Audio(t.preview).play();
    container.appendChild(div);
  });
}

async function downloadAlbum() {
  await fetch('/download-album', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ tracks: currentTracks })
  });

  alert('Download started');
}
</script>

</body>
</html>
